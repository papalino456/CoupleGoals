      content="CoupleGoals is an open-source React Native prototype for shared goals and daily check-ins between partners."
    />
    <meta name="theme-color" content="#ff006e" />
    <meta property="og:title" content="CoupleGoals — Set goals. Win together." />
    <meta
      property="og:description"
      content="An open-source prototype for shared goals, daily mood check-ins, and real-time data."
    />
    <title>CoupleGoals — Shared goals and daily check-ins</title>
    <link rel="icon" href="/CoupleGoals/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <a class="skip-link" href="#noscript-main">Skip to content</a>
      <header class="noscript-header">
        <div class="shell noscript-header-inner">
          <a class="noscript-brand" href="#noscript-top">CoupleGoals</a>
          <nav aria-label="Primary navigation">
            <a href="#noscript-how">How it works</a>
            <a href="#noscript-goals">Shared goals</a>
            <a href="#noscript-checkins">Check-ins</a>
          </nav>
          <a href="https://github.com/papalino456/CoupleGoals">View source</a>
        </div>
      </header>
      <main class="noscript-main" id="noscript-main">
        <section class="shell noscript-hero" id="noscript-top">
          <p>SHARED GOALS + DAILY CHECK-INS</p>
          <h1>SET GOALS.<br />WIN TOGETHER.</h1>
          <p>A React Native prototype for couples to connect, create shared goals, and record daily mood check-ins—together.</p>
          <a href="https://github.com/papalino456/CoupleGoals">View source</a>
        </section>
        <section class="shell noscript-section" id="noscript-goals">
          <h2>Shared goals</h2>
          <p>Keep categorized goals connected to both partners, with optional descriptions and target dates.</p>
        </section>
        <section class="shell noscript-section" id="noscript-how">
          <h2>How it works</h2>
          <ol>
            <li><strong>Connect.</strong> Pair two accounts into one partnership.</li>
            <li><strong>Create.</strong> Add a shared goal with a title and category.</li>
            <li id="noscript-checkins"><strong>Check in.</strong> Record a 1–10 mood and an optional note.</li>
            <li><strong>Complete together.</strong> Either partner can mark a shared goal complete.</li>
          </ol>
        </section>
        <section class="shell noscript-section">
          <h2>Built with</h2>
          <p>React Native + Expo, Clerk, and Convex.</p>
        </section>

      <footer class="noscript-footer">
